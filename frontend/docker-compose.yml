services:
  postgres:
    image: postgres:16
    container_name: messenger-pilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-messenger_stage1}
    ports:
      - "${HOST_POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      args:
        DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-messenger_stage1}?schema=public
        SESSION_SECRET: ${SESSION_SECRET}
        SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
        OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    container_name: messenger-pilot-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-messenger_stage1}?schema=public
      SESSION_SECRET: ${SESSION_SECRET}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      POSTGRES_CONTAINER_NAME: messenger-pilot-postgres
      PORT: 3000
    ports:
      - "${APP_PORT:-3000}:3000"
    volumes:
      - ./storage/uploads:/app/storage/uploads
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  postgres-data:
